camera:
  index: 0

models:
  person: yolov8n.pt
  face:
    score_threshold: 0.6
  pose: yolov8n-pose.pt

rois:
  safe:
    x1: 80
    y1: 60
    x2: 560
    y2: 420
  climb_rail:
    # 침대 난간 상단 좁은 띠. 실행 중 'c' 키로 재선택.
    x1: 80
    y1: 40
    x2: 560
    y2: 80

heuristics:
  suffocation:
    min_duration_s: 5.0
    keypoint_conf_threshold: 0.5
    flipped_min_visible: 3     # 4개(양쪽 어깨·엉덩이) 중 N 이상 보이면 flipped
    blanket_max_visible: 0     # 이 이하면 blanket
  climbing:
    min_duration_s: 2.0
    ankle_conf_threshold: 0.5
    standing_y_margin: 20      # hip_y - shoulder_y ≥ (px)
  roi_exit:
    min_duration_s: 0.0        # 즉시 판정, grace로 튐 완화

stability:
  grace_s: 0.5
  ema_alpha: 0.4

dispatcher:
  cooldown_s: 30.0
