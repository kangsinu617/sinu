camera:
  index: 0

models:
  person: yolov8n.pt       # COCO person 클래스
  face:
    score_threshold: 0.6   # YuNet confidence 하한

heuristics:
  face_missing:
    min_duration_s: 5.0    # person은 보이는데 얼굴이 안 보이는 상태 지속 시간

  roi_exit:
    # 안전 ROI (프레임 픽셀). person 중심이 이 박스를 벗어나면 즉시 알림.
    # 기본값은 640x480 기준 중앙. 카메라 배치에 맞춰 수정하거나, 실행 중 'r' 키로 재선택.
    x1: 80
    y1: 60
    x2: 560
    y2: 420

dispatcher:
  cooldown_s: 30.0
